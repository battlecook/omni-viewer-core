name: Release npm package

# Triggered when a `v*` tag is pushed (e.g. `v0.1.0`). The job verifies that
# the tag matches package.json, validates and builds the package, attaches the
# npm tarball to a GitHub Release, and uses the matching CHANGELOG section as
# the release notes.
#
# To cut a release locally:
#   1. Bump `version` in package.json and package-lock.json.
#   2. `npm run typecheck && npm test` to validate the release.
#   3. `git commit -am "chore: release vX.Y.Z" && git tag vX.Y.Z`
#   4. `git push origin main --tags`

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag ($TAG_VERSION) must match package.json ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package tarball
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_FILE=$(node -p "const p = require('./package.json'); p.name.replace(/^@/, '').replaceAll('/', '-') + '-' + p.version + '.tgz'")
          mkdir -p release
          npm pack --pack-destination release
          PACKAGE_PATH="release/$PACKAGE_FILE"
          if [ ! -f "$PACKAGE_PATH" ]; then
            echo "Expected $PACKAGE_PATH but it does not exist."
            exit 1
          fi
          echo "path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! awk -v version="$VERSION" '
            index($0, "## [" version "]") == 1 {
              in_section = 1
              print
              next
            }
            in_section && /^## / {
              exit
            }
            in_section {
              print
            }
            END {
              if (!in_section) exit 2
            }
          ' CHANGELOG.md > release-notes.md; then
            echo "CHANGELOG.md does not contain a section for version $VERSION."
            exit 1
          fi
          if [ ! -s release-notes.md ]; then
            echo "The changelog section for version $VERSION is empty."
            exit 1
          fi

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: omni-viewer-core-${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.package.outputs.path }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
